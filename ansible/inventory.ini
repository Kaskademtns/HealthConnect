[webservers]
# Format: [VM_NAME] ansible_host=[INTERNAL_IP]
hc-test-vm ansible_host=10.0.2.4

[dbservers]
hc-db-vm ansible_host=10.0.3.3

[all:vars]
# Use your real OS Login username from `whoami` on the VM
ansible_user=gutierrez_jd97_gmail_com
ansible_ssh_private_key_file=~/.ssh/google_compute_engine

# The ProxyCommand must use your specific project-id and zone
ansible_ssh_common_args='-o ProxyCommand="/usr/bin/gcloud compute start-iap-tunnel {{ inventory_hostname }} 22 --listen-on-stdin --project=healthconnect-project-500381 --zone=us-central1-a --quiet" -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'